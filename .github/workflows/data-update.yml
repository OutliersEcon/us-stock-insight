name: Weekly Data Update

on:
  schedule:
    - cron: '0 2 * * 1'  # 每週一 UTC 02:00 執行
  workflow_dispatch:       # 允許手動觸發

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch SPY Holdings
        run: python scripts/fetch_spy_holdings.py

      - name: Run AI Agent Parser
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/ai_agent_parser.py

      - name: Commit and push updated data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: auto-update SPY holdings and company data [$(date +'%Y-%m-%d')]"
          git push
